# Nix Configuration Tasks

[tasks.check-personal]
description = "Build the personal darwin configuration without applying"
run = "nix build --no-link .#darwinConfigurations.personal.system"

[tasks.check-work]
description = "Build the work darwin configuration without applying"
run = "nix build --no-link .#darwinConfigurations.work.system"

[tasks.update]
description = "Update flake inputs"
run = "nix flake update"

[tasks.ai-update]
description = "Update ai flake input submodule to latest"
run = "nix flake update ai"

[tasks.ai-plugins-update]
description = "Update all Claude Code marketplaces and plugins"
run = "./scripts/ai-plugins-update.sh"

[tasks.pkg-update]
description = "Update all local packages in pkgs/ (interactive with Claude)"
run = "claude 'Use the pkg-update skill to update all packages in pkgs/'"

[tasks.pkg-update-script]
description = "Update all local packages in pkgs/ with the repo script"
run = "./scripts/pkg-update.sh"
